<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ClubAdmin - Gestión Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
    body { font-family: 'Poppins', sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; line-height: 1.5; -webkit-tap-highlight-color: transparent; }
    header { 
        background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        position: sticky; top: 0; z-index: 100; display: flex; flex-direction: column; align-items: center;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .header-top { display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 12px; }
    .club-identity { display: flex; align-items: center; gap: 10px; }
    .club-logo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #334155; }
    .club-name { font-size: 18px; font-weight: 700; color: #f8fafc; }
    .tabs-container { display: flex; width: 100%; background: #1e293b; border-radius: 10px; overflow: hidden; }
    .tab-btn { flex: 1; padding: 10px 5px; font-size: 14px; background: transparent; color: #94a3b8; border: none; font-weight: 600; transition: 0.2s; margin:0;}
    .tab-btn.active { background: #38bdf8; color: #0f172a; }
    .container { display: flex; flex-direction: column; padding: 15px; gap: 15px; }
    .card { background: #1e293b; padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
    .card h3 { margin-top: 0; font-weight: 600; color: #f8fafc; margin-bottom: 15px; }
    input, select { padding: 14px; border-radius: 10px; border: 1px solid #334155; background: #0b1220; color: white; width: 100%; box-sizing: border-box; font-size: 16px; font-family: 'Poppins'; outline: none; margin: 5px 0; }
    button { padding: 14px; border-radius: 10px; border: none; width: 100%; font-size: 15px; font-weight: 600; font-family: 'Poppins'; cursor: pointer; transition: transform 0.1s; margin: 5px 0; }
    button:active { transform: scale(0.96); }
    .player { background: #0b1220; padding: 18px; border-radius: 14px; margin-top: 15px; border: 1px solid #1e293b; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; margin: 5px 0; text-transform: uppercase; }
    .debt { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.5); }
    .paidGreen { background: #22c55e; color: #000; }
    .stateRed { background: #ef4444; color: #fff; }
    .stateYellow { background: #facc15; color: #000; }
    .stateGreen { background: #22c55e; color: #000; }
    .packGray { background: #334155; color: white; border: 1px solid #475569; }
    .packGreen { background: #10b981; color: #000; border: 1px solid #10b981;}
    .deleteBtn { background: transparent; color: #ef4444; border: 1px solid #ef4444; margin-top: 15px; font-size: 13px;}
    .viewBtn { background: #3b82f6; color: white; }
    .backBtn { background: #475569; color: white; margin-bottom: 20px; }
    .wsBtn { background: #25d366; color: white; text-decoration: none; display: block; text-align: center; padding: 14px; border-radius: 10px; margin-top: 5px; font-weight: 600;}
    .rev-detail { font-size: 14px; color: #94a3b8; background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid #1e293b; margin-top: 15px; }
    .income-item, .expense-item, .history-item { padding: 12px; border-radius: 10px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .income-item { border-left: 4px solid #22c55e; background: #0f172a; }
    .expense-item { border-left: 4px solid #ef4444; background: #0f172a; }
    .history-item { border-left: 4px solid #38bdf8; background: #1e293b; }
    .del-icon { background: rgba(239, 68, 68, 0.1); color: #ef4444; width: 30px; height: 30px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size:16px; cursor:pointer;}
    .btn-config { background: transparent; border: 1px solid rgba(56, 189, 248, 0.5); color: #38bdf8; padding: 6px 12px; width: auto; border-radius: 8px; font-size: 14px; margin: 0;}
    #loginView { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
    .login-box { background: #1e293b; padding: 40px 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; border: 1px solid rgba(56, 189, 248, 0.3); box-shadow: 0 10px 25px rgba(0,0,0,0.5);}
    .tab-content { display: none; flex-direction: column; gap: 15px; }
    .tab-content.active { display: flex; }
    .excelBtn { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; margin-top: 15px; }
    #searchInput { background: #0f172a; margin-bottom: 15px; }
</style>
</head>
<body>

<header id="mainHeader" style="display:none;">
    <div class="header-top">
        <div class="club-identity">
            <img id="headerLogo" src="" class="club-logo" style="display:none;">
            <span id="headerName" class="club-name">Club Demo</span>
        </div>
        <button class="btn-config" onclick="showView('settings')">⚙️ Ajustes</button>
    </div>
    <div class="tabs-container">
        <button id="btnTabResumen" class="tab-btn active" onclick="switchTab('resumen')">📊 Balance</button>
        <button id="btnTabJugadores" class="tab-btn" onclick="switchTab('jugadores')">👥 Lista</button>
        <button id="btnTabViernes" class="tab-btn" onclick="switchTab('viernes')" style="display:none;">🗓️ Actividad</button>
    </div>
</header>

<div class="container">
    <div id="loginView">
        <div class="login-box">
            <h2 style="color: #38bdf8; margin-top:0;">Acceso Sistema</h2>
            <input type="password" id="passInput" placeholder="Contraseña" style="text-align: center;">
            <button onclick="checkLogin()" style="background: #38bdf8; color: black; margin-top: 15px;">Entrar</button>
            <p id="loginError" style="color: #ef4444; display: none; margin-top: 10px;">❌ Error</p>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <div id="tabResumen" class="tab-content active">
            <div class="card">
                <h3>💰 Estado de Caja</h3>
                <select id="monthSelect" onchange="setMonth(this.value)"></select>
                <div id="revenueTotal" class="rev-detail"></div>
                <button onclick="exportToCSV()" class="excelBtn">📊 Exportar Excel</button>
            </div>
            <div class="card">
                <h3>💵 Otros Ingresos</h3>
                <div style="display:flex; gap:5px;">
                    <input id="incDesc" placeholder="Concepto" style="flex:2; margin:0;"/>
                    <input id="incAmount" type="number" placeholder="$" style="flex:1.2; margin:0;"/>
                    <button class="paidGreen" onclick="addOtherIncome()" style="flex:1; margin:0;">+</button>
                </div>
                <div id="incomeList"></div>
            </div>
            <div class="card">
                <h3>💸 Gastos</h3>
                <div style="display:flex; gap:5px;">
                    <input id="expDesc" placeholder="Concepto" style="flex:2; margin:0;"/>
                    <input id="expAmount" type="number" placeholder="$" style="flex:1.2; margin:0;"/>
                    <button class="stateRed" onclick="addExpense()" style="flex:1; margin:0; background:#ef4444;">-</button>
                </div>
                <div id="expensesList"></div>
            </div>
        </div>

        <div id="tabJugadores" class="tab-content">
            <div class="card">
                <h3>➕ Agregar Jugador</h3>
                <div style="display:flex; gap:5px;">
                    <input id="name" placeholder="Nombre completo" style="margin:0;" />
                    <button onclick="addPlayer()" style="background:#38bdf8; color: black; margin:0; width:100px;">Agregar</button>
                </div>
            </div>
            <div class="card">
                <h3>👥 Jugadores</h3>
                <input type="text" id="searchInput" placeholder="🔍 Buscar..." onkeyup="renderPlayers()">
                <div id="players"></div>
            </div>
        </div>

        <div id="tabViernes" class="tab-content">
            <div class="card">
                <h3 id="lbl_act_title">🗓️ Asistencia</h3>
                <div id="fridays"></div>
            </div>
        </div>
    </div>

    <div class="card" id="profileView" style="display:none;"></div>
    <div class="card" id="fridayView" style="display:none;"></div>
    
    <div class="card" id="settingsView" style="display:none;">
        <button class='backBtn' onclick="showView('list')">⬅ Volver</button>
        <h3>⚙️ Ajustes del Sistema</h3>
        <div style="background: #0b1220; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #1e293b;">
            <p style="margin-top:0; color:#38bdf8;">Identidad</p>
            <input id="conf_clubName" placeholder="Nombre"/>
            <input type="file" id="logoUpload" accept="image/*" onchange="handleLogoUpload(event)">
            <div id="logoPreviewContainer" style="display:none; text-align:center; margin-top:10px;">
                <img id="logoPreview" src="" style="width:60px; height:60px; border-radius:50%; border:2px solid #38bdf8;">
            </div>
            <input type="hidden" id="conf_clubLogo" />
            <button class="paidGreen" onclick="saveBranding()">Guardar Marca</button>
        </div>
        <div style="background: #0b1220; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #1e293b;">
            <p style="margin-top:0; color:#38bdf8;">Actividad Extra (Viernes, etc.)</p>
            <select id="conf_extraEnabled"><option value="true">Sí</option><option value="false">No</option></select>
            <input id="conf_extraName" placeholder="Nombre (ej: Viernes)"/>
            <label style="font-size:12px;">Día (0-Dom, 1-Lun... 5-Vie, 6-Sab):</label>
            <select id="conf_extraDay">
                <option value="1">Lunes</option><option value="2">Martes</option><option value="3">Miércoles</option>
                <option value="4">Jueves</option><option value="5">Viernes</option><option value="6">Sábado</option><option value="0">Domingo</option>
            </select>
            <label style="font-size:12px;">Suelto ($):</label><input id="p_friday" type="number"/>
            <label style="font-size:12px;">Pack ($):</label><input id="p_pack" type="number"/>
            <button class="paidGreen" onclick="saveExtraConfig()">Guardar Extra</button>
        </div>
        <div style="background: #0b1220; padding: 15px; border-radius: 12px; border: 1px solid #1e293b;">
            <p style="margin-top:0; color:#38bdf8;">Planes Mensuales</p>
            <div id="dynamicPlansContainer"></div>
            <button class="viewBtn" onclick="addNewPlan()" style="background:#475569;">+ Agregar Plan</button>
            <button class="paidGreen" onclick="saveDynamicPlansConfig()">Guardar Planes</button>
        </div>
    </div>
</div>

<script>
// LAS LLAVES DE TU NUEVO PROYECTO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyC2B36GFhscSn4H3OUUcw-uIwzRyRP5d6c",
  authDomain: "pagina-administrativa.firebaseapp.com",
  databaseURL: "https://pagina-administrativa-default-rtdb.firebaseio.com",
  projectId: "pagina-administrativa",
  storageBucket: "pagina-administrativa.firebasestorage.app",
  messagingSenderId: "534068709032",
  appId: "1:534068709032:web:a58c5d9354bff2cb72e49d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const MASTER_PASS = "admin123"; 

let isLoggedIn = false;
let currentTabState = 'resumen'; 

let data = { 
    players:[], fridayAttendance:{}, fridayPack:{}, plans:{}, monthPayments:{}, history:{}, expenses:{}, otherIncome:{},
    branding: { name: "Club Demo", logo: "" },
    extraActivity: { enabled: true, name: "Viernes", dayOfWeek: 5, price: 8000, packPrice: 20000 },
    dynamicPlans: { "1": { name: "1 vez/sem", price: 30000 }, "2": { name: "2 veces/sem", price: 45000 } }
};

let now = new Date();
function getMonthName(date){ return date.toLocaleString('es-AR',{month:'long',year:'numeric'}); }
let selectedMonth = getMonthName(now); 
let currentView = 'list';
let selectedPlayer = null;
let selectedFriday = null;

function checkLogin() {
    if(document.getElementById('passInput').value === MASTER_PASS) {
        isLoggedIn = true;
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('mainHeader').style.display = 'flex';
        render();
    } else { document.getElementById('loginError').style.display = 'block'; }
}

// ⚠️ ATENCIÓN: AHORA GUARDA EN clubAdminData PARA NO TOCAR LA PERLA
db.ref('clubAdminData').on('value', (snapshot) => {
    const cloudData = snapshot.val();
    if(cloudData) { 
        data = { ...data, ...cloudData };
        if(!data.players) data.players = [];
        if(!data.extraActivity) data.extraActivity = { enabled: true, name: "Viernes", dayOfWeek: 5, price: 8000, packPrice: 20000 };
        if(!data.dynamicPlans) data.dynamicPlans = { "1": { name: "1 vez/sem", price: 30000 } };
    }
    updateBrandingUI();
    if(isLoggedIn) render();
});

function save(){ db.ref('clubAdminData').set(data); }

function updateBrandingUI() {
    document.getElementById('headerName').textContent = data.branding.name;
    if(data.branding.logo) { document.getElementById('headerLogo').src = data.branding.logo; document.getElementById('headerLogo').style.display = 'block'; }
}

function handleLogoUpload(event) {
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = 150; canvas.height = 150;
            canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById('conf_clubLogo').value = dataUrl;
            document.getElementById('logoPreview').src = dataUrl;
            document.getElementById('logoPreviewContainer').style.display = 'block';
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function saveBranding() { data.branding.name = document.getElementById('conf_clubName').value; data.branding.logo = document.getElementById('conf_clubLogo').value; save(); alert("Guardado"); }

function saveExtraConfig() {
    data.extraActivity.enabled = document.getElementById('conf_extraEnabled').value === "true";
    data.extraActivity.name = document.getElementById('conf_extraName').value;
    data.extraActivity.dayOfWeek = parseInt(document.getElementById('conf_extraDay').value);
    data.extraActivity.price = parseInt(document.getElementById('p_friday').value) || 0;
    data.extraActivity.packPrice = parseInt(document.getElementById('p_pack').value) || 0;
    save(); alert("Actualizado"); render();
}

function renderDynamicPlansSettings() {
    let container = document.getElementById('dynamicPlansContainer'); container.innerHTML = '';
    Object.keys(data.dynamicPlans).forEach(id => {
        let p = data.dynamicPlans[id];
        container.innerHTML += `<div class="plan-row" data-id="${id}" style="display:flex; gap:5px; margin-bottom:5px;"><input class="p-name" value="${p.name}" style="flex:2;"/><input class="p-price" type="number" value="${p.price}" style="flex:1;"/><button onclick="removeDynamicPlan('${id}')" style="width:auto; background:none; color:red; box-shadow:none;">×</button></div>`;
    });
}

function addNewPlan() { let id = "p"+Date.now(); data.dynamicPlans[id] = {name:"", price:0}; renderDynamicPlansSettings(); }
function removeDynamicPlan(id) { delete data.dynamicPlans[id]; renderDynamicPlansSettings(); }
function saveDynamicPlansConfig() {
    let rows = document.querySelectorAll('.plan-row');
    data.dynamicPlans = {};
    rows.forEach(r => { let id = r.dataset.id; data.dynamicPlans[id] = { name: r.querySelector('.p-name').value, price: parseInt(r.querySelector('.p-price').value)||0 }; });
    save(); alert("Planes guardados"); render();
}

function switchTab(t) {
    currentTabState = t;
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
    document.getElementById('btnTab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
    render();
}

function showView(v) {
    currentView = (v==='list') ? 'list' : v;
    document.getElementById('mainContent').style.display = (v==='list') ? 'block' : 'none';
    document.getElementById('profileView').style.display = (v==='profile') ? 'block' : 'none';
    document.getElementById('fridayView').style.display = (v==='friday') ? 'block' : 'none';
    document.getElementById('settingsView').style.display = (v==='settings') ? 'block' : 'none';
    if(v==='settings') {
        document.getElementById('conf_clubName').value = data.branding.name;
        document.getElementById('conf_clubLogo').value = data.branding.logo;
        if(data.branding.logo) { document.getElementById('logoPreview').src = data.branding.logo; document.getElementById('logoPreviewContainer').style.display = 'block'; }
        document.getElementById('conf_extraEnabled').value = data.extraActivity.enabled ? "true" : "false";
        document.getElementById('conf_extraName').value = data.extraActivity.name;
        document.getElementById('conf_extraDay').value = data.extraActivity.dayOfWeek || 5;
        document.getElementById('p_friday').value = data.extraActivity.price;
        document.getElementById('p_pack').value = data.extraActivity.packPrice;
        renderDynamicPlansSettings();
    }
    render();
}

function toNum(val) {
    if (typeof val === 'object' && val !== null) return Number(val.price) || 0;
    return Number(val) || 0;
}

function updateRevenueUI() {
    let cuotas = 0; let sueltos = 0; let packs = 0; let gastos = 0; let otrosIng = 0;
    let ext = data.extraActivity;

    if (data.monthPayments && data.monthPayments[selectedMonth]) {
        data.players.forEach(p => {
            if (data.monthPayments[selectedMonth][p]) cuotas += toNum(data.monthPayments[selectedMonth][p]);
        });
    }

    if(ext && ext.enabled) {
        data.players.forEach(p => { if(data.fridayPack && data.fridayPack[p]) packs += toNum(ext.packPrice); });
        Object.keys(data.fridayAttendance || {}).forEach(k => {
            if(k.startsWith(selectedMonth)) {
                data.players.forEach(p => {
                    let v = data.fridayAttendance[k][p];
                    if(v && v.present && v.paid) sueltos += toNum(ext.price);
                });
            }
        });
    }

    if(data.expenses && data.expenses[selectedMonth]) data.expenses[selectedMonth].forEach(e => gastos += toNum(e.amount));
    if(data.otherIncome && data.otherIncome[selectedMonth]) data.otherIncome[selectedMonth].forEach(e => otrosIng += toNum(e.amount));

    let totalIngresos = cuotas + sueltos + packs + otrosIng;
    let neto = totalIngresos - gastos;

    let html = `<div style="font-size: 13px; color: #94a3b8; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:4px;"><span>📅 Mes (Cuotas):</span> <b>$${cuotas.toLocaleString()}</b></div>`;
    
    if(ext && ext.enabled) {
        html += `<div style="display:flex; justify-content:space-between; margin-bottom:4px;"><span>🎟️ ${ext.name} Sueltos:</span> <b>$${sueltos.toLocaleString()}</b></div>
                 <div style="display:flex; justify-content:space-between; margin-bottom:4px;"><span>🎫 Packs ${ext.name}:</span> <b>$${packs.toLocaleString()}</b></div>`;
    }
    
    html += `<div style="display:flex; justify-content:space-between;"><span>💵 Otros Ingresos:</span> <b>$${otrosIng.toLocaleString()}</b></div>
        </div>
        <div style="display:flex; justify-content:space-between; color:#22c55e;"><span>📈 Ingresos Totales:</span> <b>$${totalIngresos.toLocaleString()}</b></div>
        <div style="display:flex; justify-content:space-between; color:#ef4444; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:8px; margin-bottom:8px;"><span>📉 Gastos Totales:</span> <b>-$${gastos.toLocaleString()}</b></div>
        <div style="display:flex; justify-content:space-between; color:#38bdf8; font-size:1.3em;"><span>💰 CAJA NETA:</span> <b>$${neto.toLocaleString()}</b></div>`;
    
    document.getElementById('revenueTotal').innerHTML = html;

    let ilist = document.getElementById('incomeList'); ilist.innerHTML = '';
    if(data.otherIncome && data.otherIncome[selectedMonth]) data.otherIncome[selectedMonth].forEach(e => {
        ilist.innerHTML += `<div class="income-item"><span>${e.desc}</span><div><b>+$${e.amount}</b><button class="del-icon" onclick="removeOtherIncome(${e.id})">×</button></div></div>`;
    });
    let elist = document.getElementById('expensesList'); elist.innerHTML = '';
    if(data.expenses && data.expenses[selectedMonth]) data.expenses[selectedMonth].forEach(e => {
        elist.innerHTML += `<div class="expense-item"><span>${e.desc}</span><div><b>-$${e.amount}</b><button class="del-icon" onclick="removeExpense(${e.id})">×</button></div></div>`;
    });
}

function calcDebt(p) {
    let mp = (data.monthPayments && data.monthPayments[selectedMonth]) ? toNum(data.monthPayments[selectedMonth][p]) : 0;
    let planId = data.plans && data.plans[p] ? data.plans[p] : Object.keys(data.dynamicPlans)[0];
    let planPrice = (planId !== 'extra' && data.dynamicPlans[planId]) ? toNum(data.dynamicPlans[planId].price) : 0;
    let extraDebt = 0;
    if(data.extraActivity && data.extraActivity.enabled && (!data.fridayPack || !data.fridayPack[p])) {
        Object.keys(data.fridayAttendance || {}).forEach(k => {
            if(k.startsWith(selectedMonth) && data.fridayAttendance[k][p]?.present && !data.fridayAttendance[k][p]?.paid) extraDebt += toNum(data.extraActivity.price);
        });
    }
    return Math.max(0, (planPrice - mp) + extraDebt);
}

function getState(p){ let d = calcDebt(p); if(d<=0) return {text:'AL DÍA', cls:'stateGreen'}; return {text:'DEUDA', cls:'stateRed'}; }

function renderPlayers() {
    let pd = document.getElementById('players'); pd.innerHTML = '';
    let search = document.getElementById('searchInput').value.toLowerCase();
    let ext = data.extraActivity;
    [...data.players].sort().filter(p => p.toLowerCase().includes(search)).forEach(p => {
        let debt = calcDebt(p); let state = getState(p);
        let msj = encodeURIComponent(`Hola ${p}! Resumen en ${data.branding.name} (${selectedMonth}): Saldo pendiente $${debt}.`);
        let planVal = data.plans && data.plans[p] ? data.plans[p] : Object.keys(data.dynamicPlans)[0];
        let el = document.createElement('div'); el.className = 'player';
        el.innerHTML = `
            <div style="display:flex; justify-content:space-between;"><b>${p}</b> <span class="badge ${state.cls}">${state.text}</span></div>
            <div style="font-size:12px; color:#94a3b8; margin-bottom:10px;">Pendiente: $${debt.toLocaleString()}</div>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <select style="flex:1" onchange="if(!data.plans) data.plans={}; data.plans['${p}']=this.value; save(); render();">
                    ${Object.keys(data.dynamicPlans).map(id => `<option value="${id}" ${planVal==id?'selected':''}>${data.dynamicPlans[id].name}</option>`).join('')}
                    ${ext.enabled ? `<option value="extra" ${planVal==='extra'?'selected':''}>Solo ${ext.name}</option>` : ''}
                </select>
                ${ext.enabled ? `<button class="${data.fridayPack && data.fridayPack[p]?'packGreen':'packGray'}" style="flex:1; font-size:11px;" onclick="if(!data.fridayPack) data.fridayPack={}; data.fridayPack['${p}']=!data.fridayPack['${p}']; save(); render();">Pack ${ext.name}</button>` : ''}
            </div>
            <div style="display:flex; gap:5px;"><input id='pay_${p}' type='number' placeholder='Monto'/><button class='paidGreen' onclick="payMonth('${p}')" style="width:100px;">Cobrar</button></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:5px;">
                <button class='viewBtn' onclick="selectedPlayer='${p}'; showView('profile');">Historial</button>
                <a href="https://wa.me/?text=${msj}" class="wsBtn" target="_blank" style="margin:0;">📲 Avisar</a>
            </div>
            <button class="deleteBtn" onclick="removePlayer('${p}')">Eliminar</button>`;
        pd.appendChild(el);
    });
}

function renderFridaysMenu() {
    let fr = document.getElementById('fridays'); fr.innerHTML = '';
    let ext = data.extraActivity;
    let parts = selectedMonth.split(" de ");
    let mIdx = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"].indexOf(parts[0].toLowerCase());
    let year = parseInt(parts[1] || new Date().getFullYear());
    
    for(let i=1; i<=31; i++){
        let d = new Date(year, mIdx, i);
        if(d.getMonth() !== mIdx) break;
        if(d.getDay() === ext.dayOfWeek){
            let b = document.createElement('button'); b.className='viewBtn'; b.style.marginBottom='5px';
            b.textContent = `${ext.name} ${i}`;
            b.onclick = () => { selectedFriday = i; showView('friday'); };
            fr.appendChild(b);
        }
    }
}

function renderProfile(){
    let p = selectedPlayer; let h = data.history && data.history[p] ? data.history[p] : [];
    let html = `<button class='backBtn' onclick="showView('list')">⬅ Volver</button><h2>Historial de ${p}</h2>`;
    if(h.length === 0) html += '<p style="color:#94a3b8;">Sin pagos registrados.</p>';
    h.slice().reverse().forEach(x => { html += `<div class="history-item"><span>${x.date}</span><div><b>$${x.amount}</b><button class="del-icon" onclick="deletePayment('${p}', ${x.id})">×</button></div></div>`; });
    document.getElementById('profileView').innerHTML = html;
}

function renderFridayView(){
    let f = selectedFriday; let k = selectedMonth + '-' + f; let ext = data.extraActivity;
    let html = `<button class='backBtn' onclick="showView('list')">⬅ Volver</button><h2>${ext.name} ${f}</h2>`;
    [...data.players].sort().forEach(p => {
        let a = (data.fridayAttendance && data.fridayAttendance[k]) ? data.fridayAttendance[k][p] || {present:false, paid:false} : {present:false, paid:false};
        html += `<div class="player" style="margin-top:10px;"><b style="font-size:1.1em;">${p}</b><div style="display:flex; gap:10px; margin-top:10px;"><button class="${a.present?'stateGreen':'packGray'}" onclick="toggleFriday('${p}',${f})"> ${a.present?'✔ Presente':'✖ Ausente'} </button><button class="${a.paid?'stateGreen':'stateRed'}" onclick="toggleFridayPay('${p}',${f})" ${!a.present?'disabled':''}> ${a.paid?'💰 Pagó':'⏳ No pagó'} </button></div></div>`;
    });
    document.getElementById('fridayView').innerHTML = html;
}

function toggleFriday(p,d){
    let k=selectedMonth+'-'+d; if(!data.fridayAttendance) data.fridayAttendance={}; if(!data.fridayAttendance[k]) data.fridayAttendance[k]={};
    if(!data.fridayAttendance[k][p]) data.fridayAttendance[k][p]={present:false,paid:false};
    data.fridayAttendance[k][p].present = !data.fridayAttendance[k][p].present;
    if(!data.fridayAttendance[k][p].present) data.fridayAttendance[k][p].paid = false;
    save(); render();
}
function toggleFridayPay(p,d){ let k=selectedMonth+'-'+d; data.fridayAttendance[k][p].paid = !data.fridayAttendance[k][p].paid; save(); render(); }
function setMonth(m){ selectedMonth = m; render(); }
function addPlayer(){ let n = document.getElementById('name').value.trim(); if(n) { data.players.push(n); save(); render(); } }
function removePlayer(p){ if(confirm(`¿Borrar a ${p}?`)) { data.players = data.players.filter(x=>x!==p); save(); render(); } }
function payMonth(p){
    let a = parseInt(document.getElementById('pay_'+p).value); if(!a) return;
    if(!data.monthPayments) data.monthPayments={}; if(!data.monthPayments[selectedMonth]) data.monthPayments[selectedMonth]={};
    data.monthPayments[selectedMonth][p] = (data.monthPayments[selectedMonth][p] || 0) + a;
    if(!data.history) data.history={}; if(!data.history[p]) data.history[p]=[];
    data.history[p].push({id:Date.now(), date:new Date().toLocaleDateString(), amount:a, month:selectedMonth});
    save(); render();
}
function addOtherIncome() {
    let d = document.getElementById('incDesc').value; let a = parseInt(document.getElementById('incAmount').value);
    if(d&&a) { if(!data.otherIncome[selectedMonth]) data.otherIncome[selectedMonth]=[]; data.otherIncome[selectedMonth].push({id:Date.now(), desc:d, amount:a}); save(); render(); }
}
function removeOtherIncome(id) { data.otherIncome[selectedMonth] = data.otherIncome[selectedMonth].filter(e => e.id !== id); save(); render(); }
function addExpense() {
    let d = document.getElementById('expDesc').value; let a = parseInt(document.getElementById('expAmount').value);
    if(d&&a) { if(!data.expenses[selectedMonth]) data.expenses[selectedMonth]=[]; data.expenses[selectedMonth].push({id:Date.now(), desc:d, amount:a}); save(); render(); }
}
function removeExpense(id) { data.expenses[selectedMonth] = data.expenses[selectedMonth].filter(e => e.id !== id); save(); render(); }
function deletePayment(p, id) {
    if(confirm("¿Borrar pago?")) {
        let idx = data.history[p].findIndex(h => h.id === id);
        if(idx > -1) {
            let pay = data.history[p][idx];
            data.monthPayments[pay.month][p] -= pay.amount;
            data.history[p].splice(idx, 1); save(); render();
        }
    }
}
function render() {
    if(!isLoggedIn) return;
    updateMonthSelector();
    let ext = data.extraActivity;
    document.getElementById('btnTabViernes').style.display = (ext && ext.enabled) ? 'block' : 'none';
    document.getElementById('btnTabViernes').textContent = `🗓️ ${ext.name}`;
    document.getElementById('lbl_act_title').textContent = `🗓️ Asistencia ${ext.name}`;
    if(currentView === 'list') {
        if(currentTabState === 'resumen') updateRevenueUI();
        if(currentTabState === 'jugadores') renderPlayers();
        if(currentTabState === 'viernes') renderFridaysMenu();
    } else if(currentView==='profile') renderProfile();
    else if(currentView==='friday') renderFridayView();
}
function exportToCSV() {
    let ext = data.extraActivity;
    let csv = "Resumen " + data.branding.name + " - " + selectedMonth + "\n\nNombre,Plan,Pagado,Deuda\n";
    [...data.players].sort().forEach(p => { 
        let planVal = data.plans && data.plans[p] ? data.plans[p] : Object.keys(data.dynamicPlans)[0];
        let planStr = planVal === 'extra' ? ("Solo " + ext.name) : (data.dynamicPlans[planVal]?.name || "N/A");
        csv += `"${p}","${planStr}","$${toNum(data.monthPayments[selectedMonth]?.[p])}","$${calcDebt(p)}"\n`; 
    });
    csv += "\nINGRESOS EXTRA\nDesc,Monto\n";
    if(data.otherIncome[selectedMonth]) data.otherIncome[selectedMonth].forEach(e => csv += `"${e.desc}","+$${e.amount}"\n`);
    csv += "\nGASTOS\nDesc,Monto\n";
    if(data.expenses[selectedMonth]) data.expenses[selectedMonth].forEach(e => csv += `"${e.desc}","-$${e.amount}"\n`);
    let b = new Blob(["\uFEFF"+csv], {type:'text/csv'}); let a = document.createElement('a');
    a.href = URL.createObjectURL(b); a.download = `ClubAdmin_${selectedMonth}.csv`; a.click();
}
function updateMonthSelector(){
    let sel=document.getElementById('monthSelect'); if(sel.options.length > 0) return;
    for(let i = 0; i < 12; i++){ 
        let d = new Date(2026, i, 1); 
        let opt=document.createElement('option'); opt.value=getMonthName(d); opt.textContent=getMonthName(d);
        if(opt.value===selectedMonth) opt.selected=true; sel.appendChild(opt);
    }
}
</script>
</body>
